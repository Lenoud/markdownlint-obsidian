name: Release verify

on:
  release:
    types: [published]

jobs:
  verify-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for publish workflows to complete and CDN to propagate
        # npm-publish takes 3-10 min; add buffer for CDN propagation
        run: sleep 600

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cli from npmjs.org and verify version
        if: startsWith(github.event.release.tag_name, 'packages/cli')
        run: |
          VERSION="${GITHUB_REF_NAME#packages/cli}"
          VERSION="${VERSION#v}"
          npm install -g "markdownlint-obsidian-cli@${VERSION}"
          OUT=$(markdownlint-obsidian --version)
          echo "$OUT"
          echo "$OUT" | grep -q "${VERSION}"

      - name: Audit npm signatures (verifies provenance)
        if: startsWith(github.event.release.tag_name, 'packages/cli')
        run: |
          VERSION="${GITHUB_REF_NAME#packages/cli}"
          VERSION="${VERSION#v}"
          mkdir /tmp/audit-test && cd /tmp/audit-test
          npm init -y
          npm install "markdownlint-obsidian-cli@${VERSION}"
          npm audit signatures
